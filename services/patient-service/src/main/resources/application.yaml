server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: patient-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8889}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${PATIENT_DB_URL:jdbc:postgresql://localhost:55435/patient_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${PATIENT_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
