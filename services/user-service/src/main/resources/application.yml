server:
  port: 8085

spring:
  application:
    name: user-service
  datasource:
    url: ${USER_SERVICE_DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${USER_SERVICE_DB_USERNAME:postgres}
    password: ${USER_SERVICE_DB_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.group01.user: INFO
    com.group01.commonsecurity: INFO

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9080}
    realm: ${KEYCLOAK_REALM:clinic-appointment}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:clinic-user-service}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change-me}
