spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    config:
      fail-fast: false
      request-connect-timeout: ${SPRING_CLOUD_CONFIG_REQUEST_CONNECT_TIMEOUT:2000}
      request-read-timeout: ${SPRING_CLOUD_CONFIG_REQUEST_READ_TIMEOUT:5000}
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}
    username: ${PAYMENT_DB_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8086}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

clients:
  appointment-service:
    base-url: ${APPOINTMENT_SERVICE_URL:http://localhost:8081}
