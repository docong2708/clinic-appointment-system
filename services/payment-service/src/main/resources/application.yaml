spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8889}
  datasource:
    url: ${SPRING_DATASOURCE_URL:${PAYMENT_DB_URL:jdbc:postgresql://localhost:5432/payment_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${PAYMENT_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8086}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

clients:
  appointment-service:
    base-url: ${APPOINTMENT_SERVICE_URL:http://localhost:8081}
