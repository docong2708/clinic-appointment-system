<!doctype html>
<html>
<body style="margin:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="background:#4338ca;padding:24px 28px;color:#ffffff;">
              <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">MSS Clinic</div>
              <div style="font-size:24px;font-weight:700;margin-top:8px;">Reset your password</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:1.7;">Hi {{userName}},</p>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#374151;">Use the secure link below to create a new password. The link will expire soon.</p>
              <a href="{{resetLink}}" style="display:inline-block;background:#4338ca;color:#ffffff;text-decoration:none;font-weight:700;padding:12px 18px;border-radius:8px;">Reset password</a>
              <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#6b7280;">If you did not request this change, you can ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
