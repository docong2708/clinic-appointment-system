<!doctype html>
<html>
<body style="margin:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <div style="display:none;max-height:0;overflow:hidden;">{{bodyText}}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="background:#0f766e;padding:24px 28px;color:#ffffff;">
              <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">MSS Clinic</div>
              <div style="font-size:24px;font-weight:700;margin-top:8px;">{{titleHtml}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="margin:0 0 20px;font-size:15px;line-height:1.7;color:#374151;">{{body}}</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-top:20px;border-top:1px solid #e5e7eb;">
                <tr>
                  <td style="padding-top:16px;font-size:13px;color:#6b7280;">Mã thông báo</td>
                  <td align="right" style="padding-top:16px;font-size:13px;color:#111827;">{{notificationId}}</td>
                </tr>
                <tr>
                  <td style="padding-top:8px;font-size:13px;color:#6b7280;">Nguồn</td>
                  <td align="right" style="padding-top:8px;font-size:13px;color:#111827;">{{sourceService}}</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 28px;background:#f9fafb;color:#6b7280;font-size:12px;line-height:1.5;">
              Email này được gửi tự động từ MSS Clinic. Vui lòng không trả lời email này.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
