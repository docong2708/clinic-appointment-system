<!doctype html>
<html>
<body style="margin:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:1px solid #dbeafe;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="background:#1d4ed8;padding:24px 28px;color:#ffffff;">
              <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Appointment</div>
              <div style="font-size:24px;font-weight:700;margin-top:8px;">Request received</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="margin:0 0 20px;font-size:15px;line-height:1.7;color:#374151;">{{body}}</p>
              <div style="padding:16px;border:1px solid #dbeafe;border-radius:10px;background:#eff6ff;">
                <div style="font-size:12px;color:#1d4ed8;font-weight:700;text-transform:uppercase;">Appointment ID</div>
                <div style="margin-top:6px;font-size:14px;color:#111827;word-break:break-word;">{{aggregateId}}</div>
              </div>
              <p style="margin:20px 0 0;font-size:13px;line-height:1.6;color:#6b7280;">We will notify you again when the appointment is confirmed or updated.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
