spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/clinic_db_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 0

eureka:
  client:
    enabled: false
