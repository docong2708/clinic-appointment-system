server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_REPO_URI:https://github.com/hieult-dev/clinic-config-repo.git}
          default-label: main
          clone-on-start: true
          force-pull: true

          username: ${GIT_USERNAME:}
          password: ${GIT_TOKEN:}

encrypt:
  key: ${ENCRYPT_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always