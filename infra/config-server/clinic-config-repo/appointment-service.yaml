server:
  port: 8081

spring:
  application:
    name: appointment-service

  datasource:
    url: ${APPOINTMENT_DB_URL:jdbc:postgresql://localhost:5432/appointment_db}
    username: ${APPOINTMENT_DB_USERNAME:postgres}
    password: '{cipher}a8c9c278e886940ffb45c84c9303fe807664cf3a6d09f47212d45b84029bf194'
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: '{cipher}59d9f2020bc7192ccf3367a29b5f6375dc4d21178f690deec83a590a37eaafaf'

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

clients:
  openfeign:
    connect-timeout-millis: 5000
    read-timeout-millis: 10000
    logger-level: basic

  doctor-service:
    base-url: ${DOCTOR_SERVICE_URL:http://localhost:8082}

  patient-service:
    base-url: ${PATIENT_SERVICE_URL:http://localhost:8084}

  notification-service:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
    appointment-events-path: /appointment-events

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always