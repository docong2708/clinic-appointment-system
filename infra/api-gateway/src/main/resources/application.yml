server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-auth
              uri: lb://user-service
              predicates:
                - Path=/api/auth/**
            - id: user-service-users
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: patient-service
              uri: lb://patient-service
              predicates:
                - Path=/api/patients/**
            - id: doctor-service
              uri: lb://doctor-service
              predicates:
                - Path=/api/doctors/**
            - id: appointment-service
              uri: lb://appointment-service
              predicates:
                - Path=/api/appointments/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

security:
  jwt:
    secret: ${JWT_SECRET:mYvRhtw7xJxXlyePdZWA52rxT0qfjwT069nN11NYhIncVJFOzh1v44ftn3JQlS0sGe6LzD6ld82Xn49ErOoBLU}
    issuer: clinic-appointment-system
    access-token-expiration: 15m
    refresh-token-expiration: 7d

gateway:
  security:
    public-endpoints:
      - POST /api/auth/register
      - POST /api/auth/login
      - POST /api/auth/refresh-token
      - GET /actuator/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
