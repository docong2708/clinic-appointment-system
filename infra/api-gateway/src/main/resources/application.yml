spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${USER_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/auth/**