
networks:
  clinic-network:
    driver: bridge

# ==========================================
# KHAI BÁO VOLUMES ĐỂ LƯU TRỮ DỮ LIỆU
# ==========================================
volumes:
  appointment-db-data:
  doctor-db-data:
  notification-db-data:
  patient-db-data:
  user-db-data:
  rabbitmq-data:
  zookeeper-data:
  kafka-data:
  keycloak-data:

services:
  # ==========================================
  # 1. ISOLATED DATABASES (5 DATABASES)
  # ==========================================
  appointment-db:
    image: postgres:15-alpine
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "55432:5432"
    networks:
      - clinic-network
    volumes:
      - appointment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  doctor-db:
    image: postgres:15-alpine
    container_name: doctor-db
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "55433:5432"
    networks:
      - clinic-network
    volumes:
      - doctor-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doctor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:15-alpine
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "55434:5432"
    networks:
      - clinic-network
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  patient-db:
    image: postgres:15-alpine
    container_name: patient-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "55435:5432"
    networks:
      - clinic-network
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "55436:5432"
    networks:
      - clinic-network
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. MESSAGE BROKERS & IDENTITY PROVIDER
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_clinic
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - clinic-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - clinic-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - clinic-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: start-dev --import-realm
    ports:
      - "9080:8080"
    networks:
      - clinic-network
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import:ro

  # ==========================================
  # 3. SPRING CLOUD INFRASTRUCTURE
  # ==========================================
  config-server:
    build:
      context: ./infra/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./clinic-config-repo:/config-repo
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=https://github.com/docong2708/clinic-appointment-repo.git
      - SPRING_CLOUD_CONFIG_SERVER_GIT_USERNAME=docong2708
      - SPRING_CLOUD_CONFIG_SERVER_GIT_PASSWORD=access-token
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./infra/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    networks:
      - clinic-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./infra/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/clinic-appointment
      - KEYCLOAK_TOKEN_URI=http://keycloak:8080/realms/clinic-appointment/protocol/openid-connect/token
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy

  # ==========================================
  # 4. BUSINESS MICROSERVICES
  # ==========================================
  appointment-service:
    build:
      context: ./services/appointment-service
    container_name: appointment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - APPOINTMENT_DB_URL=jdbc:postgresql://appointment-db:5432/appointment_db
      - APPOINTMENT_DB_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
      - DOCTOR_SERVICE_URL=http://doctor-service:8082
      - PATIENT_SERVICE_URL=http://patient-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8083
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
      appointment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  doctor-service:
    build:
      context: ./services/doctor-service
    container_name: doctor-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DOCTOR_DB_URL=jdbc:postgresql://doctor-db:5432/doctor_db
      - DOCTOR_DB_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
      doctor-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - NOTIFICATION_DB_URL=jdbc:postgresql://notification-db:5432/notification_db
      - NOTIFICATION_DB_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_started

  patient-service:
    build:
      context: ./services/patient-service
    container_name: patient-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - PATIENT_DB_URL=jdbc:postgresql://patient-db:5432/patient_db
      - PATIENT_DB_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
      patient-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - USER_SERVICE_DB_URL=jdbc:postgresql://user-db:5432/user_db
      - USER_SERVICE_DB_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres_password
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
    networks:
      - clinic-network
    depends_on:
      eureka-server:
        condition: service_healthy
      user-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
